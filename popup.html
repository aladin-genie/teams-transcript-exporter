<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>📝 Transcript Exporter</h2>
      <div id="statusIndicator" class="status-indicator">Checking...</div>
    </div>

    <div id="notTranscriptView" class="message-box" style="display:none;">
      <div class="icon">📹</div>
      <p>Open a Teams meeting recording with transcript to export.</p>
      <small>Navigate to a recorded meeting → Click "Transcript" tab</small>
    </div>

    <div id="transcriptView" style="display:none;">
      <div class="meeting-info">
        <div class="info-row">
          <span class="label">Meeting:</span>
          <span id="meetingTitle" class="value">-</span>
        </div>
        <div class="info-row">
          <span class="label">Duration:</span>
          <span id="meetingDuration" class="value">-</span>
        </div>
        <div class="info-row">
          <span class="label">Entries:</span>
          <span id="entryCount" class="value">-</span>
        </div>
      </div>

      <div class="section">
        <label>Export Options</label>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="includeTimestamps" checked> Include timestamps
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="includeSpeakerNames" checked> Include speaker names
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="cleanText" checked> Clean text (no filler words)
          </label>
        </div>
      </div>

      <div class="section">
        <label>Format</label>
        <select id="exportFormat">
          <option value="json" selected>JSON (structured)</option>
          <option value="txt">Plain Text</option>
          <option value="markdown">Markdown</option>
        </select>
      </div>

      <button id="exportBtn" class="export-btn">
        📥 Export Transcript
      </button>

      <div id="progress" class="progress" style="display:none;">
        <div class="spinner"></div>
        <span id="progressText">Loading transcript entries...</span>
      </div>
    </div>

    <div id="result" class="result" style="display:none;"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
